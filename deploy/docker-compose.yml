services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veritas-postgres
    restart: unless-stopped
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas"]
      interval: 10s
      timeout: 5s
      retries: 5

  veritas:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USERNAME: veritas
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    container_name: veritas-web
    restart: unless-stopped
    # ports:
    #   - "80:8765"
    volumes:
      - ../web_data:/app/web_data
      - ../outputs:/app/outputs
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Shanghai
      - VERITAS_LOG_LEVEL=INFO
      - VERITAS_HOST=0.0.0.0
      - VERITAS_PORT=8765
      - VERITAS_DATA_ROOT=/app/web_data
      - VERITAS_OUTPUT_ROOT=/app/outputs
      - VERITAS_DATABASE_URL=postgresql://veritas:veritas@postgres:5432/veritas
      - VERITAS_AUTH_MODE=none
      - VERITAS_USERS_DB=/app/web_data/users.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      postgres:
        condition: service_healthy

  celery-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    container_name: veritas-celery-worker
    restart: unless-stopped
    command: celery -A engine.tasks.celery_app worker --loglevel=info
    volumes:
      - ../web_data:/app/web_data
      - ../outputs:/app/outputs
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ../.env
    environment:
      - TZ=Asia/Shanghai
      - VERITAS_LOG_LEVEL=INFO
      - VERITAS_DATA_ROOT=/app/web_data
      - VERITAS_OUTPUT_ROOT=/app/outputs
      - VERITAS_DATABASE_URL=postgresql://veritas:veritas@postgres:5432/veritas
      - CELERY_BROKER_URL=sqlalchemy+postgresql://veritas:veritas@postgres:5432/veritas
      - CELERY_RESULT_BACKEND=db+postgresql://veritas:veritas@postgres:5432/veritas
    depends_on:
      postgres:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
