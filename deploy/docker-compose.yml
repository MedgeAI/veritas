services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: vprod-postgres
    restart: unless-stopped
    # ports:
    #   - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-veritas_prod}
      POSTGRES_USER: ${POSTGRES_USER:-veritas_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in deploy/.env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-veritas_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vprod-redis
    restart: unless-stopped
    # AOF persistence: 防止 Redis 重启时丢失 Celery 排队中的任务
    # appendfsync everysec: 最多丢失 1 秒数据，IO 开销可接受
    command: redis-server --appendonly yes --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  veritas:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USERNAME: veritas
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    container_name: vprod-web
    restart: unless-stopped
    # ports:
    #   - "80:8765"
    volumes:
      - ../web_data:/app/web_data
      - ../outputs:/app/outputs
    env_file:
      - ../.env
      - path: .env
        required: false
    environment:
      - TZ=Asia/Shanghai
      - VERITAS_LOG_LEVEL=INFO
      - VERITAS_HOST=0.0.0.0
      - VERITAS_PORT=8765
      - VERITAS_DATA_ROOT=/app/web_data
      - VERITAS_OUTPUT_ROOT=/app/outputs
      - VERITAS_DATABASE_URL=postgresql://${POSTGRES_USER:-veritas_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veritas_prod}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER:-veritas_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veritas_prod}
      - VERITAS_USERS_DB=/app/web_data/users.db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery-worker:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USERNAME: veritas
        USER_UID: "${UID:-1000}"
        USER_GID: "${GID:-1000}"
    container_name: vprod-celery-worker
    restart: unless-stopped
    command: celery -A engine.tasks.celery_app worker --loglevel=info
    # Override Dockerfile HEALTHCHECK: celery worker doesn't serve HTTP on :8765
    healthcheck:
      test: ["CMD-SHELL", "celery -A engine.tasks.celery_app inspect ping --timeout 5 | grep -q pong || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    volumes:
      - ../web_data:/app/web_data
      - ../outputs:/app/outputs
    env_file:
      - ../.env
      - path: .env
        required: false
    environment:
      - TZ=Asia/Shanghai
      - VERITAS_LOG_LEVEL=INFO
      - VERITAS_DATA_ROOT=/app/web_data
      - VERITAS_OUTPUT_ROOT=/app/outputs
      - VERITAS_DATABASE_URL=postgresql://${POSTGRES_USER:-veritas_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veritas_prod}
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=db+postgresql://${POSTGRES_USER:-veritas_prod}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-veritas_prod}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

volumes:
  pgdata:
  redisdata:
