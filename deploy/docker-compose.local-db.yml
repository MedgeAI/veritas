services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veritas-postgres-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: veritas_dev
      POSTGRES_USER: veritas_dev
      POSTGRES_PASSWORD: veritas_dev_pass
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas_dev -d veritas_dev"]

volumes:
  pgdata_dev:
