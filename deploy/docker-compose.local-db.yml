services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veritas-postgres-dev
    restart: unless-stopped
    ports:
      - "0.0.0.0:5433:5432"
    environment:
      POSTGRES_DB: veritas_dev
      POSTGRES_USER: veritas_dev
      POSTGRES_PASSWORD: ${VERITAS_DEV_DB_PASS:?Set VERITAS_DEV_DB_PASS in your shell or .env}
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas_dev -d veritas_dev"]

  redis:
    image: redis:7-alpine
    container_name: veritas-redis-dev
    restart: unless-stopped
    ports:
      - "0.0.0.0:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata_dev:
