# Veritas 本地开发编排
#
# 端口约定（不碰生产服务）：
#   PostgreSQL  -> 5433（不碰生产 5432）
#   FastAPI     -> 8765（backend 容器）
#   Vite        -> 5173（宿主机，HMR 热重载）
#
# 架构：
#   backend 容器：Python + PyTorch + CUDA + opencode + 全部 pip 依赖
#     代码从宿主机挂载（/workspace），uvicorn --reload 热重载
#     模型权重从宿主机挂载（/app/models）
#   postgres 容器：pgvector
#   前端：宿主机 Vite dev server（/api 代理到 backend:8765）

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: veritas-pg-dev
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: veritas
      POSTGRES_USER: veritas
      POSTGRES_PASSWORD: veritas
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - veritas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U veritas"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: veritas-backend-dev
    restart: unless-stopped
    # 以宿主机用户身份运行，bind mount 写入的文件属主与宿主机一致
    ports:
      - "8765:8765"
    volumes:
      # 代码挂载（热重载）
      - ./web/backend:/workspace/web/backend:cached
      - ./engine:/workspace/engine:cached
      - ./cli:/workspace/cli:cached
      - ./runtime:/workspace/runtime:cached
      - ./protocols:/workspace/protocols:cached
      - ./configs:/workspace/configs:cached
      - ./scripts:/workspace/scripts:cached
      - ./third_party:/workspace/third_party:cached
      - ./opencode.json:/workspace/opencode.json:ro
      # 运行产物 + 数据（持久化）
      - ./outputs:/app/outputs
      - ./outputs:/workspace/outputs
      - ./web_data:/app/web_data
      - ./input:/workspace/input:ro
      - ./models:/app/models:ro
      - ./models:/workspace/models:ro
    env_file:
      - path: .env
        required: false
    environment:
      - VERITAS_DATABASE_URL=postgresql://veritas:veritas@postgres:5432/veritas
      - VERITAS_AUTH_MODE=${VERITAS_AUTH_MODE:-none}
      - VERITAS_USERS_DB=/app/web_data/users.db
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - MINERU_API_TOKEN=${MINERU_API_TOKEN:-}
      # uv venv lives in /app (build-time), but code runs from /workspace (mount-time).
      # Without this, uv falls back to conda Python which lacks cv2/timm/etc.
      - VIRTUAL_ENV=/app/.venv
      - UV_PROJECT_ENVIRONMENT=/app/.venv
    depends_on:
      postgres:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8765/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  veritas_pgdata:
