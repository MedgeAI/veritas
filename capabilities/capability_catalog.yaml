# Capability Catalog — Veritas Detection Capabilities
#
# Each capability records:
#   - capability_id: unique identifier matching the taxonomy
#   - category: visual | source_data | completeness | numeric
#   - description: one-line capability summary
#   - registry_tool_id: associated tool_id in engine/tools/registry.py (if any)
#   - version: semantic version
#   - driven_by: list of ground-truth sources that drove this capability
#   - test_coverage: list of test files
#   - validation_papers: list of papers used for cross-validation
#
# This file is the METADATA layer. engine/tools/registry.py is the EXECUTION layer.
# They are linked by registry_tool_id / capability_id.

capabilities:
