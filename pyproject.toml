[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "veritas"
version = "0.1.0"
description = "Prototype verification engine for computational research."
readme = "README.md"
requires-python = ">=3.11"
dependencies = []

[project.scripts]
veritas = "cli.main:main"

[tool.setuptools]
py-modules = []

[tool.setuptools.packages.find]
include = ["cli*", "engine*", "runtime*", "protocols*", "web*"]
where = ["."]

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
