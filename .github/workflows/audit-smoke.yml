name: Audit Smoke Test

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  audit-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: 'latest'

      - name: Sync dependencies
        run: make sync

      - name: Run audit smoke test (agent_mode=off via fake opencode)
        run: uv run python -m pytest tests/e2e/test_audit_paper_static_bundle.py -x --tb=short -v
        env:
          VERITAS_FAKE_OPENCODE: '1'
